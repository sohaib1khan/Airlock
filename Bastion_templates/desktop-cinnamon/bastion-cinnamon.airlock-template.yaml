format_version: airlock-template-v1
exported_at: "2026-04-16T00:00:00+00:00"
template:
  name: Bastion desktop (Cinnamon)
  description: |
    Cinnamon desktop over VNC with websockify on port 6901 and path /websockify (Airlock default).
    Published on Docker Hub:
    docker pull skhan1010/bastion-cinnamon:latest
    The template is pre-seeded when the backend starts.
  docker_image: skhan1010/bastion-cinnamon:latest
  workspace_home: /home/kuser/workspace
  tools:
    - cinnamon
    - tigervnc
    - websockify
  persistent_volume: true
  volume_path: /home/kuser/workspace
  env_vars: {}
  resource_limits: {}
  max_runtime_minutes: 480
