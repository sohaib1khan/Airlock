<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Airlock">
  <defs>
    <linearGradient id="al-grad" x1="22%" y1="12%" x2="88%" y2="92%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="55%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="al-shine" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#f0f9ff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#f0f9ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="al-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- App tile background -->
  <rect width="128" height="128" rx="28" fill="#070d16"/>
  <rect width="128" height="128" rx="28" fill="url(#al-shine)"/>
  <!-- Airlock rings (gateway) -->
  <circle cx="64" cy="64" r="46" fill="none" stroke="url(#al-grad)" stroke-width="3" stroke-opacity="0.35"/>
  <circle cx="64" cy="64" r="36" fill="none" stroke="url(#al-grad)" stroke-width="2" stroke-opacity="0.5"/>
  <!-- Lock body -->
  <rect x="44" y="58" width="40" height="38" rx="8" fill="url(#al-grad)" filter="url(#al-glow)"/>
  <!-- Shackle -->
  <path
    fill="none"
    stroke="url(#al-grad)"
    stroke-width="6"
    stroke-linecap="round"
    d="M48 58V48c0-8.8 7.2-16 16-16h0c8.8 0 16 7.2 16 16v10"
  />
  <!-- Keyhole -->
  <circle cx="64" cy="76" r="5" fill="#070d16"/>
  <rect x="61" y="76" width="6" height="12" rx="1" fill="#070d16"/>
</svg>
